<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malínský Burger festival 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-shadow-glow { text-shadow: 0 0 30px rgba(255, 102, 0, 0.7); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce { animation: bounce 2s infinite ease-in-out; }
        html { scroll-behavior: smooth; }
        .mobile-menu-overlay { z-index: 9999 !important; background-color: #0a0a0a !important; }
        .clickable-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .clickable-card:hover { transform: translateY(-5px); border-color: #f97316; box-shadow: 0 10px 30px -10px rgba(249, 115, 22, 0.3); }
        input, textarea { background: #171717 !important; border: 1px solid #262626 !important; }
        input:focus, textarea:focus { border-color: #f97316 !important; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2v12.66" />,
                Ticket: <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2ZM13 5v2M13 17v2M13 11v2" />,
                Clock: <><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
                Menu: <><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></>,
                X: <><line x1="18" x2="6" y1="6" y2="18" /><line x1="6" x2="18" y1="6" y2="18" /></>,
                Beer: <path d="M17 11h1a3 3 0 0 1 0 6h-1M5 21h12M5 3h12M5 3v18M17 3v18" />,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3" />,
                ExternalLink: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />,
                Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />,
                Instagram: <><rect x="2" y="2" width="20" height="20" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" /></>,
                QrCode: <><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M7 7h2v2H7zm8 0h2v2h-2zm0 8h2v2h-2zm-8 0h2v2H7z" /></>,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                CreditCard: <><rect x="1" y="4" width="22" height="16" rx="2" ry="2" /><line x1="1" x2="23" y1="10" y2="10" /></>,
                Mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></>,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [formStatus, setFormStatus] = useState(null);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                setFormStatus('Odesláno! Brzy se vám ozveme.');
                e.target.reset();
                setTimeout(() => setFormStatus(null), 5000);
            };

            const foodVendors = [
                { name: "Cakir´s", desc: "Prémiové burgery s nádechem orientu.", url: "#" },
                { name: "U Dřeváka", desc: "Poctivá klasika z grilu.", url: "#" },
                { name: "Smashing Machine", desc: "Mistři smash burgerů.", url: "#" },
                { name: "Balikejk", desc: "Unikátní Street food.", url: "#" },
                { name: "Malínské smažené kuře", desc: "Křupavé kousky podle lokální receptury.", url: "#" },
                { name: "Dos Amigos", desc: "Tacos a quesadillas v mexickém stylu.", url: "#" },
                { name: "Křup", desc: "Šťavnaté burgery a legendární křupavé kuře.", url: "#" },
                { name: "The Pitmaster's Soul", desc: "Pravé BBQ: Šťavnatá žebírka a křídla v tradičním USA stylu.", url: "#" },
                { name: "Badass American Hot Dog", desc: "Pořádné Hot dogy s hromadou doplňků inspirované New Yorkem.", url: "#" },
                { name: "Underground Meat Lab", desc: "Bistro ve sklepě: Burgery se zauzeným jazykem, morkem a Bacon Boom speciál.", url: "#" }
            ];

            const drinkVendors = [
                { name: "Jílek Caffé", desc: "Výběrová káva a ledové osvěžení.", icon: "Coffee", url: "https://www.jilekcaffe.cz/" },
                { name: "Pivovar Kobza", desc: "Řemeslné pivo z rodinného pivovaru.", icon: "Beer", url: "https://pivovarkobza.cz/" },
                { name: "Pivovar Holba", desc: "Ryze horské pivo z Jeseníků.", icon: "Beer", url: "https://www.holba.cz/" },
                { name: "Chill zóna s barem", desc: "Míchané drinky a festivalová pohoda.", icon: "Beer", url: "#" }
            ];

            const partners = [
                { name: "Obec Nový Malín", role: "Hlavní partner", url: "https://www.novymalin.cz/" }, 
                { name: "KIA Kašpar Rapotín", role: "Generální partner", url: "https://www.kiakaspar.cz/" }, 
                { name: "SK Buildings", role: "Partner (Domy)", url: "https://www.skbuildings.cz/" },
                { name: "Oramont", role: "Partner", url: "https://www.oramont.cz/" },
                { name: "NFCtron", role: "Cashless podpora", url: "https://www.nfctron.com/cs" },
                { name: "Lité podlahy Hoško", role: "Partner", url: "https://www.litepodlahyhosko.cz/" },
                { name: "Ošetření dřeva Hylák", role: "Partner", url: "https://www.osetrenidreva.cz/" },
                { name: "Smartstep Šumperk", role: "Partner", url: "https://www.smartstep.cz/" },
                { name: "Obchůdek s kvítím", role: "Partner", url: "https://www.obchudekskvitim.cz/" },
                { name: "Tespo", role: "Partner", url: "https://www.tespo-sumperk.cz/" },
                { name: "MIKIstav Šumperk", role: "Partner", url: "https://www.mikistav.cz/" },
                { name: "Macte Šumperk", role: "Partner", url: "https://www.macte.cz/" },
                { name: "Gruno Šumperk", role: "Partner", url: "https://www.gruno.cz/" },
                { name: "Statek Winter", role: "Pusté Žibřidovice", url: "https://www.statekwinter.cz/" },
                { name: "Via Delicia", role: "Partner", url: "https://www.viadelicia.cz/" }, 
                { name: "ČAWA", role: "Sportovní záštita", url: "http://www.armwrestling.cz/" }, 
                { name: "Děti dětem", role: "Iniciativa", url: "http://www.detidetem.com/" }
            ];

            const Navigation = () => (
                <nav className={`fixed w-full z-50 transition-all ${scrolled ? 'bg-black/95 py-3 shadow-2xl border-b border-orange-500/30' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-4 md:px-6 flex justify-between items-center">
                        <div className="flex items-center gap-4 text-white">
                            <div className="text-lg md:text-2xl font-black italic tracking-tighter cursor-pointer" onClick={() => { setActiveTab('home'); window.scrollTo(0,0); }}>
                                BURGER <span className="text-orange-500 underline decoration-2 underline-offset-4 uppercase leading-none">FESTIVAL</span>
                            </div>
                        </div>
                        <div className="hidden lg:flex space-x-6 items-center font-bold uppercase text-[11px] tracking-widest text-neutral-300">
                            <button onClick={() => setActiveTab('home')} className={`hover:text-orange-500 transition ${activeTab === 'home' ? 'text-orange-500' : ''}`}>Domů</button>
                            <a href="#jidlo" className="hover:text-orange-500 transition">Gril</a>
                            <a href="#piti" className="hover:text-orange-500 transition">Nápoje</a>
                            <a href="#parkovani" className="hover:text-orange-500 transition">Parkování</a>
                            <a href="#kontakt" className="hover:text-orange-500 transition">Kontakt</a>
                            <button onClick={() => setActiveTab('paka')} className="px-4 py-2 border border-orange-500 rounded-lg hover:bg-orange-500 hover:text-white transition">Páka</button>
                        </div>
                        <button onClick={() => setIsMenuOpen(true)} className="lg:hidden text-orange-500 p-2">
                            <Icon name="Menu" size={32} />
                        </button>
                    </div>
                </nav>
            );

            const HomeView = () => (
                <>
                    <header className="relative min-h-[90vh] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-black/70 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=1920" className="absolute inset-0 w-full h-full object-cover" alt="Hero" />
                        <div className="relative z-20 text-center px-4 max-w-4xl">
                            <div className="inline-block px-4 py-1.5 border-2 border-orange-500 text-orange-500 text-[10px] font-black uppercase tracking-[0.3em] mb-8 rounded-full bg-black/50 backdrop-blur-sm animate-pulse">
                                5. Jubilejní ročník
                            </div>
                            <h1 className="text-4xl md:text-7xl font-black uppercase mb-4 leading-tight tracking-tighter text-white text-shadow-glow">
                                MALÍNSKÝ<br /><span className="text-orange-500 italic">BURGER FESTIVAL</span>
                            </h1>
                            <p className="text-lg md:text-2xl text-white font-bold mb-10 uppercase tracking-[0.2em] italic">27. Června 2026</p>
                            
                            <button 
                                onClick={() => { setActiveTab('paka'); window.scrollTo(0,0); }}
                                className="group bg-white text-black hover:bg-orange-600 hover:text-white px-8 py-4 rounded-xl font-black uppercase tracking-widest shadow-2xl transition-all transform hover:scale-105 flex items-center gap-4 mx-auto text-sm"
                            >
                                <Icon name="Trophy" className="group-hover:animate-bounce" /> TURNAJ V PÁCE: INFO & REGISTRACE
                            </button>
                        </div>
                    </header>

                    {/* CASHLESS INFO BAR */}
                    <section className="bg-orange-600 py-6 border-y border-orange-400">
                        <div className="container mx-auto px-4 flex flex-col md:flex-row items-center justify-center gap-8 text-white">
                            <div className="flex items-center gap-4">
                                <Icon name="CreditCard" size={32} />
                                <div className="text-left leading-tight">
                                    <h3 className="font-black uppercase text-lg italic">Bezhotovostní Festival</h3>
                                    <p className="text-[10px] uppercase font-bold opacity-90 tracking-widest">Plaťte kartou, telefonem nebo hodinkami</p>
                                </div>
                            </div>
                            <div className="h-px w-20 bg-white/30 md:w-px md:h-10"></div>
                            <div className="flex items-center gap-6">
                                <div className="text-[10px] font-black uppercase opacity-80 italic">Podpora:</div>
                                <div className="flex gap-4">
                                    <span className="font-black text-xs tracking-tighter">NFCtron</span>
                                    <span className="font-black text-xs tracking-tighter italic underline decoration-2 decoration-white/50">VISA / MASTERCARD</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* GRIL SECTION */}
                    <section id="jidlo" className="py-24 bg-neutral-950">
                        <div className="container mx-auto px-4">
                            <div className="flex flex-col md:flex-row md:items-end gap-4 mb-16">
                                <h2 className="text-5xl md:text-6xl font-black uppercase italic text-white tracking-tighter leading-none">Mistři <span className="text-orange-500">Grilu</span></h2>
                                <p className="text-neutral-500 uppercase font-black text-[10px] tracking-widest mb-2 border-l-2 border-orange-500 pl-4 italic">To nejlepší ze street foodu 2026</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {foodVendors.map((v, i) => (
                                    <div key={i} className="clickable-card bg-neutral-900 p-8 rounded-[2.5rem] border border-neutral-800 flex flex-col justify-between group">
                                        <div>
                                            <div className="text-orange-500/20 font-black text-5xl mb-6 italic group-hover:text-orange-500 transition-colors">#{i+1}</div>
                                            <h4 className="text-xl font-black text-white mb-4 uppercase italic tracking-tight leading-tight group-hover:text-orange-500 transition-colors">{v.name}</h4>
                                            <p className="text-neutral-400 text-sm leading-relaxed italic mb-8">{v.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* NÁPOJE SECTION */}
                    <section id="piti" className="py-24 bg-neutral-900 border-y border-orange-500/10">
                        <div className="container mx-auto px-4 text-center">
                            <h2 className="text-4xl md:text-5xl font-black uppercase italic text-white tracking-tighter mb-16">Nápojové <span className="text-orange-500">Stánky</span></h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {drinkVendors.map((v, i) => (
                                    <div key={i} className="clickable-card bg-neutral-950 p-8 rounded-3xl border border-neutral-800 text-center">
                                        <div className="w-16 h-16 bg-neutral-900 rounded-2xl flex items-center justify-center mx-auto mb-6 text-orange-500">
                                            <Icon name={v.icon} size={32} />
                                        </div>
                                        <h4 className="text-lg font-black text-white mb-3 uppercase italic tracking-tight">{v.name}</h4>
                                        <p className="text-neutral-500 text-xs leading-relaxed italic mb-4">{v.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* KONTAKT SECTION */}
                    <section id="kontakt" className="py-24 bg-neutral-950">
                        <div className="container mx-auto px-4 max-w-6xl">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                                <div>
                                    <h2 className="text-5xl font-black uppercase italic text-white tracking-tighter mb-8 leading-none">Kontaktujte <span className="text-orange-500">Nás</span></h2>
                                    <p className="text-neutral-400 italic mb-10 leading-relaxed">Máte dotaz k programu, turnaji nebo chcete být součástí příštího ročníku? Neváhejte nám napsat!</p>
                                    
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-6 group">
                                            <div className="w-12 h-12 bg-neutral-900 rounded-xl flex items-center justify-center text-orange-500 border border-neutral-800 group-hover:border-orange-500 transition-colors">
                                                <Icon name="Mail" size={20} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] uppercase font-black text-neutral-600 tracking-widest">Email pro dotazy</p>
                                                <p className="font-bold text-white italic underline decoration-orange-500/10">malinskyburgerfest@gmail.com</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6 group">
                                            <div className="w-12 h-12 bg-neutral-900 rounded-xl flex items-center justify-center text-orange-500 border border-neutral-800 group-hover:border-orange-500 transition-colors">
                                                <Icon name="Phone" size={20} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] uppercase font-black text-neutral-600 tracking-widest">Telefonní kontakt</p>
                                                <p className="font-bold text-white italic">731 022 813</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6 group">
                                            <div className="w-12 h-12 bg-neutral-900 rounded-xl flex items-center justify-center text-orange-500 border border-neutral-800 group-hover:border-orange-500 transition-colors">
                                                <Icon name="MapPin" size={20} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] uppercase font-black text-neutral-600 tracking-widest">Kde nás najdete</p>
                                                <p className="font-bold text-white italic underline decoration-orange-500/30">Sokolovna Nový Malín, 788 03</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-neutral-900 p-8 md:p-12 rounded-[2.5rem] border border-neutral-800 relative shadow-2xl">
                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] uppercase font-black text-neutral-500 tracking-widest ml-2">Jméno</label>
                                                <input type="text" required placeholder="Vaše jméno" className="w-full p-4 rounded-xl text-white text-sm" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] uppercase font-black text-neutral-500 tracking-widest ml-2">E-mail</label>
                                                <input type="email" required placeholder="vas@email.cz" className="w-full p-4 rounded-xl text-white text-sm" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] uppercase font-black text-neutral-500 tracking-widest ml-2">Zpráva</label>
                                            <textarea rows="4" required placeholder="Napište nám..." className="w-full p-4 rounded-xl text-white text-sm resize-none"></textarea>
                                        </div>
                                        <button type="submit" className="w-full bg-orange-600 hover:bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl shadow-orange-500/10 italic">Odeslat zprávu</button>
                                        {formStatus && (
                                            <div className="text-center p-3 bg-green-500/10 border border-green-500/30 text-green-500 rounded-xl text-xs font-bold animate-pulse">
                                                {formStatus}
                                            </div>
                                        )}
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PARKOVÁNÍ */}
                    <section id="parkovani" className="py-24 bg-black border-y border-neutral-900">
                        <div className="container mx-auto px-4">
                            <h2 className="text-4xl font-black uppercase mb-12 text-center italic text-white tracking-tighter">Parkovací <span className="text-orange-500">Zóny</span></h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-6xl mx-auto">
                                {[
                                    { name: "Podél cesty u sokolovny", query: "Sokolovna Nový Malín" },
                                    { name: "U zdravotního střediska", query: "Zdravotní středisko Nový Malín" },
                                    { name: "U obecního úřadu (OÚ)", query: "Obecní úřad Nový Malín" },
                                    { name: "Parkoviště U Rychty", query: "Restaurace U Rychty Nový Malín" },
                                    { name: "U hřbitova", query: "Hřbitov Nový Malín" },
                                    { name: "U základní školy NM", query: "Základní škola Nový Malín" }
                                ].map((p, i) => (
                                    <a 
                                        key={i} 
                                        href={`https://www.google.com/maps/search/${encodeURIComponent(p.query)}`} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="clickable-card bg-neutral-900 p-6 rounded-2xl border border-neutral-800 flex items-center justify-between group shadow-xl"
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center text-sm font-black text-white shrink-0 italic shadow-lg">P</div>
                                            <span className="font-bold text-sm tracking-wide text-neutral-300 uppercase italic leading-none">{p.name}</span>
                                        </div>
                                        <Icon name="ExternalLink" size={18} className="text-neutral-600 group-hover:text-orange-500" />
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* SPONZOŘI */}
                    <section id="partneri" className="py-24 bg-neutral-950">
                        <div className="container mx-auto px-4 text-center">
                            <h2 className="text-[10px] font-black uppercase tracking-[0.5em] text-neutral-600 mb-16 italic">Oficiální Partneři & Podpora</h2>
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">
                                {partners.map((p, i) => (
                                    <a 
                                        key={i} 
                                        href={p.url} 
                                        target={p.url !== "#" ? "_blank" : undefined}
                                        className="bg-neutral-900/20 p-8 rounded-3xl border border-neutral-800 flex flex-col items-center justify-center hover:bg-neutral-900 transition-all group relative overflow-hidden"
                                    >
                                        <div className="absolute top-0 left-0 w-1 h-full bg-orange-500 transform -translate-x-full group-hover:translate-x-0 transition-transform"></div>
                                        <span className="text-sm md:text-base font-black uppercase tracking-tighter text-stone-200 group-hover:text-orange-500 transition-colors leading-tight">{p.name}</span>
                                        <span className="text-[8px] uppercase tracking-[0.2em] text-neutral-600 mt-2 font-bold italic">{p.role}</span>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>
                </>
            );

            const PakaView = () => (
                <div className="pt-24 min-h-screen bg-neutral-950 p-6 md:p-12">
                    <div className="max-w-4xl mx-auto bg-neutral-900 p-8 md:p-16 rounded-[3rem] border-2 border-orange-500 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-5"><Icon name="Trophy" size={300} /></div>
                        
                        <button onClick={() => setActiveTab('home')} className="mb-10 text-orange-500 font-black uppercase text-xs flex items-center gap-2 tracking-widest hover:translate-x-1 transition-transform">
                            <Icon name="ChevronRight" className="rotate-180" size={16} /> Zpět na úvodní stránku
                        </button>

                        <h2 className="text-4xl md:text-7xl font-black uppercase italic mb-8 text-white leading-none tracking-tighter">ARM<span className="text-orange-500">WRESTLING</span> CHALLENGER</h2>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 text-white relative z-10 text-left">
                            <div className="space-y-10">
                                <div>
                                    <h3 className="text-orange-500 font-black uppercase mb-6 italic tracking-widest border-b border-orange-500/20 pb-2 flex items-center gap-3">
                                        <div className="w-4 h-4 bg-orange-500 rounded-sm"></div> Soutěžní kategorie
                                    </h3>
                                    <ul className="space-y-4 font-bold uppercase italic text-sm">
                                        <li className="flex gap-4 items-center bg-neutral-800/50 p-3 rounded-lg"><span className="text-orange-500 font-black">/ 01</span> Junioři (do 18 let) - bez rozdílu vah</li>
                                        <li className="flex gap-4 items-center bg-neutral-800/50 p-3 rounded-lg"><span className="text-orange-500 font-black">/ 02</span> Ženy - bez rozdílu vah</li>
                                        <li className="flex gap-4 items-center bg-neutral-800/50 p-3 rounded-lg"><span className="text-orange-500 font-black">/ 03</span> Muži do 80kg, 90kg, 100kg a nad 100kg</li>
                                    </ul>
                                </div>
                                
                                <div className="p-8 bg-neutral-800 rounded-3xl border-l-8 border-orange-500 shadow-xl">
                                    <h4 className="text-orange-500 font-black uppercase text-[10px] mb-2 italic">Důležité časy</h4>
                                    <p className="text-xl md:text-2xl font-black mb-2 text-white">Vážení: 10:00 - 11:30</p>
                                    <p className="text-xs text-neutral-400 font-bold italic uppercase tracking-widest">Zahájení: 12:00 v Sokolovně</p>
                                </div>
                            </div>

                            <div className="bg-orange-600 p-8 md:p-10 rounded-[2.5rem] text-center shadow-2xl shadow-orange-500/30 border-4 border-orange-400">
                                <div className="bg-white p-4 rounded-2xl inline-block mb-6 shadow-inner">
                                    <Icon name="QrCode" size={60} className="text-black" />
                                </div>
                                <h4 className="font-black uppercase mb-4 tracking-tighter text-2xl italic leading-none text-white">Online<br/>Registrace</h4>
                                <button className="w-full bg-black text-white py-4 rounded-xl font-black uppercase tracking-widest hover:bg-neutral-900 transition-all shadow-xl text-xs italic">Přejít k registraci</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-neutral-950 text-white selection:bg-orange-500 overflow-x-hidden">
                    <Navigation />
                    <main>
                        {activeTab === 'home' ? <HomeView /> : <PakaView />}
                    </main>

                    <footer className="bg-black py-20 text-center border-t border-neutral-900">
                        <div className="text-2xl font-black italic tracking-tighter mb-8 uppercase text-stone-200">
                            Nový <span className="text-orange-500 underline decoration-[4px] underline-offset-[10px]">Malín</span> 2026
                        </div>
                        <div className="flex justify-center gap-10 mb-16">
                            <a href="#" className="w-12 h-12 bg-neutral-900 rounded-2xl flex items-center justify-center hover:bg-orange-600 hover:text-white transition-all transform hover:rotate-12 shadow-xl border border-neutral-800 hover:border-orange-400"><Icon name="Facebook" size={24} /></a>
                            <a href="#" className="w-12 h-12 bg-neutral-900 rounded-2xl flex items-center justify-center hover:bg-orange-600 hover:text-white transition-all transform hover:-rotate-12 shadow-xl border border-neutral-800 hover:border-orange-400"><Icon name="Instagram" size={24} /></a>
                        </div>
                        <div className="space-y-2 opacity-30">
                            <p className="text-[9px] uppercase font-black tracking-[0.4em] text-neutral-500">© 2026 Malínský Burger Festival | Pořádá Obec Nový Malín</p>
                            <p className="text-[9px] uppercase font-black tracking-[0.4em] text-neutral-500 italic">Moderuje: Petr Kamlar | Vstup na akci zdarma</p>
                        </div>
                    </footer>

                    {isMenuOpen && (
                        <div className="mobile-menu-overlay fixed inset-0 flex flex-col items-center justify-center space-y-8 p-10 animate-in slide-in-from-right">
                            <button onClick={() => setIsMenuOpen(false)} className="absolute top-6 right-6 text-orange-500"><Icon name="X" size={48} /></button>
                            <button onClick={() => { setActiveTab('home'); setIsMenuOpen(false); }} className="text-3xl font-black uppercase italic text-white">Domů</button>
                            <a href="#jidlo" onClick={() => setIsMenuOpen(false)} className="text-3xl font-black uppercase italic text-white">Gril</a>
                            <a href="#piti" onClick={() => setIsMenuOpen(false)} className="text-3xl font-black uppercase italic text-white">Nápoje</a>
                            <button onClick={() => { setActiveTab('paka'); setIsMenuOpen(false); }} className="text-3xl font-black uppercase italic text-orange-500">Turnaj Páka</button>
                            <a href="#kontakt" onClick={() => setIsMenuOpen(false)} className="text-3xl font-black uppercase italic text-white">Kontakt</a>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
