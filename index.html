<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malínský Burgerfestival 2026</title>
    <!-- React & Babel pro běh bez buildu -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-shadow-glow { text-shadow: 0 0 30px rgba(255, 102, 0, 0.7); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce { animation: bounce 2s infinite ease-in-out; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Vlastní komponenty pro ikony (SVG) pro eliminaci chyb s externími knihovnami
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2v12.66" />,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M18 3.13a4 4 0 0 1 0 7.75" />,
                Ticket: <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2ZM13 5v2M13 17v2M13 11v2" />,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Clock: <><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                Menu: <><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></>,
                X: <><line x1="18" x2="6" y1="6" y2="18" /><line x1="6" x2="18" y1="6" y2="18" /></>,
                Beer: <path d="M17 11h1a3 3 0 0 1 0 6h-1M5 21h12M5 3h12M5 3v18M17 3v18" />,
                Dumbbell: <path d="M6.5 6.5h11M6.5 17.5h11M18 21v-2a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v2M18 3v2a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V3" />,
                Map: <><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" /><line x1="9" x2="9" y1="3" y2="18" /><line x1="15" x2="15" y1="6" y2="21" /></>
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const program = [
                { time: "10:00", title: "Otevření areálu", desc: "Start gastro zóny a street food specialit" },
                { time: "11:00", title: "Armwrestling Challenger", desc: "Zahájení soubojů v sokolovně" },
                { time: "13:00", title: "Rodinná zóna", desc: "Start Cinema zóny a tvořivých dílen" },
                { time: "15:00", title: "Live Music", desc: "DJ Michal Rossignol & Saxo" },
                { time: "16:00", title: "Soutěž v pití tupláků", desc: "Souboj na čas o věcné ceny" },
                { time: "17:00", title: "Finále OPEN", desc: "Velkolepé finále na venkovním pódiu" },
                { time: "18:30", title: "Burgerchampion 2026", desc: "Vyhlášení nejlepšího burgeru" },
                { time: "20:00", title: "Afterparty", desc: "DJ Peet V, Semyrka & Landchi" },
            ];

            const vendors = [
                { name: "Cakir´s", type: "Burger Specialista", desc: "Prémiové burgery s nádechem orientu." },
                { name: "U Dřeváka", type: "Burger Specialista", desc: "Poctivá klasika z grilu." },
                { name: "Smashing Machine", type: "Burger Specialista", desc: "Mistři smash burgerů." },
                { name: "Balikejk", type: "Street Food", desc: "Unikátní dobroty." },
                { name: "Malínské smažené kuře", type: "Street Food", desc: "Křupavé kousky podle lokální receptury." },
                { name: "Jílek Caffé", type: "Nápojář / Káva", desc: "Výběrová káva a ledové osvěžení." },
                { name: "Dos Amigos", type: "Mexická kuchyně", desc: "Pálivé tacos a quesadillas." },
                { name: "Křup", type: "Street Food", desc: "Legendární bramborové spirálky." },
                { name: "Pivovar Kobza", type: "Nápojář / Pivo", desc: "Řemeslné pivo z rodinného pivovaru." },
                { name: "Pivovar Holba", type: "Nápojář / Pivo", desc: "Ryze horské pivo z Jeseníků." },
                { name: "Chill zóna s barem", type: "Nápojář / Drinky", desc: "Míchané drinky a pohoda." },
            ];

            const partners = [
                { name: "Obec Nový Malín", role: "Hlavní partner" }, 
                { name: "KIA", role: "Generální partner" }, 
                { name: "ČAWA", role: "Sportovní záštita" }, 
                { name: "Děti dětem", role: "Iniciativa" },
                { name: "Ochrana dřevo", role: "Partner" }, 
                { name: "Lité podlahy Hoško", role: "Partner" }, 
                { name: "SK Buildings", role: "Partner" },
                { name: "Via Delicia", role: "Partner" }, 
                { name: "Sefran", role: "Partner" }, 
                { name: "Obchůdek s kvítím", role: "Partner" }
            ];

            const parking = [
                "Podél cesty u sokolovny",
                "Parkoviště u OÚ",
                "Parkoviště U Rychty",
                "Parkoviště u hřbitova",
                "Parkoviště u školy NM"
            ];

            return (
                <div className="min-h-screen bg-neutral-900 text-white font-sans selection:bg-orange-500">
                    {/* Navigace */}
                    <nav className={`fixed w-full z-50 transition-all ${scrolled ? 'bg-black/95 py-3 shadow-2xl' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl md:text-2xl font-black italic tracking-tighter">
                                MALÍNSKÝ <span className="text-orange-500 underline decoration-2 underline-offset-4 tracking-tighter">BURGERFEST</span>
                            </div>
                            <div className="hidden lg:flex space-x-6 font-bold uppercase text-[10px] tracking-widest text-neutral-300">
                                <a href="#stankari" className="hover:text-orange-500 transition border-b-2 border-transparent hover:border-orange-500">Stánkaři</a>
                                <a href="#sport" className="hover:text-orange-500 transition text-orange-400">Armwrestling</a>
                                <a href="#program" className="hover:text-orange-500 transition">Program</a>
                                <a href="#parkovani" className="hover:text-orange-500 transition">Parkování</a>
                            </div>
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="lg:hidden text-orange-500">
                                {isMenuOpen ? <Icon name="X" size={28} /> : <Icon name="Menu" size={28} />}
                            </button>
                        </div>
                    </nav>

                    {/* Hero Sekce */}
                    <header className="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">
                        <div className="absolute inset-0 bg-black/70 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=1920" className="absolute inset-0 w-full h-full object-cover" alt="Burgerfest pozadí" />
                        <div className="relative z-20 text-center px-6 max-w-4xl pt-12">
                            <div className="inline-block px-5 py-2 mb-8 border-2 border-orange-500 rounded-full text-orange-500 font-black uppercase tracking-widest text-xs animate-pulse bg-black/20 backdrop-blur-sm shadow-[0_0_15px_rgba(255,102,0,0.4)]">
                                5. Ročník v Novém Malíně
                            </div>
                            <h1 className="text-5xl md:text-8xl font-black uppercase mb-6 leading-[0.9] tracking-tighter">
                                BURGER<br /><span className="text-orange-500 text-shadow-glow italic">& PÁKA</span>
                            </h1>
                            <div className="flex flex-col md:flex-row gap-4 justify-center items-center font-bold">
                                <div className="flex items-center gap-3 bg-white text-black px-8 py-4 rounded-xl shadow-2xl hover:scale-105 transition-transform">
                                    <Icon name="MapPin" className="text-orange-600" size={20} />
                                    <span className="uppercase tracking-tight text-sm">Sokolovna Nový Malín</span>
                                </div>
                                <div className="flex items-center gap-3 bg-orange-600 px-8 py-4 rounded-xl shadow-2xl border border-orange-400 hover:scale-105 transition-transform">
                                    <Icon name="Clock" size={20} />
                                    <span className="uppercase tracking-tight text-sm">27. Června 2026</span>
                                </div>
                            </div>
                            <div className="mt-12 text-orange-500 font-black text-xl uppercase opacity-90 tracking-[0.3em]">Vstup pro všechny Zdarma</div>
                        </div>
                    </header>

                    {/* Armwrestling Sekce */}
                    <section id="sport" className="py-24 bg-neutral-900 border-b border-orange-500/20">
                        <div className="container mx-auto px-6">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                                <div className="border-l-8 border-orange-600 pl-8">
                                    <div className="inline-flex items-center gap-2 text-orange-500 font-black uppercase tracking-widest text-[10px] mb-4">
                                        <Icon name="Trophy" size={16} />
                                        <span>Hlavní tahák festivalu</span>
                                    </div>
                                    <h2 className="text-4xl md:text-6xl font-black uppercase mb-6 italic leading-none text-white">
                                        Armwrestling <br /><span className="text-orange-500 text-shadow-glow">Challenger 2026</span>
                                    </h2>
                                    <p className="text-neutral-400 text-lg mb-8 italic leading-relaxed">Oficiální turnaj v páce pod hlavičkou ČAWA. Profesionální zápasy v sokolovně a velké OPEN finále přímo na venkovním pódiu!</p>
                                    <div className="bg-orange-600 p-5 rounded-xl inline-block shadow-xl border border-orange-400">
                                        <p className="text-sm font-black text-white uppercase tracking-widest">Finále OPEN na pódiu v 17:00</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="aspect-square bg-neutral-800 rounded-3xl flex flex-col items-center justify-center p-6 border border-neutral-700 hover:border-orange-500 transition-all text-center">
                                        <Icon name="Trophy" className="text-orange-500 mb-4" size={32} />
                                        <h5 className="font-black uppercase text-[10px] tracking-widest leading-tight">Challenger ČAWA</h5>
                                    </div>
                                    <div className="aspect-square bg-neutral-800 rounded-3xl flex flex-col items-center justify-center p-6 border border-neutral-700 hover:border-orange-500 transition-all text-center">
                                        <Icon name="Dumbbell" className="text-orange-500 mb-4" size={32} />
                                        <h5 className="font-black uppercase text-[10px] tracking-widest leading-tight">Profi souboje</h5>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Stánkaři */}
                    <section id="stankari" className="py-24 bg-neutral-950">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl font-black uppercase tracking-tighter italic text-white">Gastro <span className="text-orange-500">Mistři</span></h2>
                                <p className="text-neutral-500 text-sm mt-2 italic">Ti nejlepší, kteří v Malíně uspokojí vaše chutě.</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                {vendors.map((v, i) => (
                                    <div key={i} className="bg-neutral-900 p-6 rounded-2xl border border-neutral-800 hover:border-orange-500/30 transition shadow-lg group text-white">
                                        <div className="text-orange-500 font-bold text-[9px] uppercase tracking-widest mb-1 group-hover:text-orange-400">Festivalový stánek</div>
                                        <h4 className="text-lg font-black text-white tracking-tight">{v.name}</h4>
                                        <p className="text-neutral-500 text-xs italic mt-1 leading-relaxed font-light">{v.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Parkování */}
                    <section id="parkovani" className="py-24 bg-neutral-900">
                        <div className="container mx-auto px-6 text-white">
                            <h2 className="text-4xl font-black uppercase mb-12 text-center tracking-tighter text-white">Kde <span className="text-orange-500">Zaparkovat?</span></h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-5xl mx-auto">
                                {parking.map((p, i) => (
                                    <div key={i} className="bg-neutral-950 p-5 rounded-xl border border-neutral-800 flex items-center gap-4 hover:border-orange-500/20 transition text-white">
                                        <div className="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-[10px] font-black shadow-lg text-white">P</div>
                                        <span className="font-bold text-sm tracking-wide text-neutral-300 uppercase">{p}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Iniciativa */}
                    <section className="py-20 bg-orange-600 text-center text-white relative overflow-hidden">
                        <div className="absolute right-0 bottom-0 opacity-10 transform translate-x-1/4 translate-y-1/4 scale-150"><Icon name="Heart" size={200} /></div>
                        <div className="container mx-auto px-6 relative z-10 text-white">
                            <h3 className="text-4xl font-black uppercase tracking-tighter mb-4 leading-none text-white">Iniciativa Děti dětem</h3>
                            <p className="text-xl font-bold opacity-90 mb-8 italic text-white">Společně jsme za 5 ročníků darovali již 80 000 Kč.</p>
                            <div className="inline-block bg-black/20 px-10 py-5 rounded-xl border-2 border-white/20 backdrop-blur-sm shadow-2xl text-white">
                                <div className="flex flex-col items-center text-white">
                                    <Icon name="Ticket" className="mb-2" />
                                    <span className="text-2xl font-black uppercase tracking-[0.2em] italic text-white">Tombola o 250 výher</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-black py-16 text-center border-t border-neutral-800 text-white">
                        <div className="text-xl font-black italic tracking-tighter mb-4 uppercase text-stone-200">
                            Obec <span className="text-orange-500">Nový Malín</span> 2026
                        </div>
                        <div className="opacity-40 text-[9px] font-black uppercase tracking-[0.5em] space-y-2 text-white">
                            <p>© 2026 Malínský Burgerfestival. Moderuje Petr Kamlar.</p>
                            <p className="text-neutral-600">Tam, kde byste to nečekali</p>
                        </div>
                    </footer>

                    {/* Mobilní Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] bg-black/98 p-10 flex flex-col items-center justify-center space-y-8 text-2xl font-black uppercase italic animate-in fade-in duration-300 text-white">
                            <button onClick={() => setIsMenuOpen(false)} className="absolute top-6 right-6 text-orange-500"><Icon name="X" size={44} /></button>
                            <a href="#stankari" onClick={() => setIsMenuOpen(false)} className="hover:text-orange-500 transition text-white">Stánkaři</a>
                            <a href="#sport" onClick={() => setIsMenuOpen(false)} className="text-orange-500 underline decoration-2 underline-offset-8">Armwrestling</a>
                            <a href="#program" onClick={() => setIsMenuOpen(false)} className="hover:text-orange-500 transition text-white">Program</a>
                            <a href="#parkovani" onClick={() => setIsMenuOpen(false)} className="hover:text-orange-500 transition text-white">Parkování</a>
                            <div className="pt-8 border-t border-neutral-800 w-full text-center">
                                <div className="text-[10px] not-italic text-neutral-600 tracking-[0.3em] text-white">27.06.2026 | Sokolovna</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
